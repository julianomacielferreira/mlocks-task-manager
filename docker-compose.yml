version: '3'
services:
  postgres:
    image: postgres:15
    container_name: mlocks_task_manager_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mlocks_bridge

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mlocks_task_manager_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    networks:
      - mlocks_bridge

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mlocks_task_manager_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - mlocks_bridge

  user-service:
    build: 
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: mlocks_task_manager_user_service
    environment:
        DATABASE_HOST: ${DATABASE_HOST}
        DATABASE_PORT: ${DATABASE_PORT}
        DATABASE_USER: ${DATABASE_USER}
        DATABASE_PASSWORD: ${DATABASE_PASSWORD}
        DATABASE_NAME: ${DATABASE_NAME}
        RABBITMQ_HOST: ${RABBITMQ_HOST}
        RABBITMQ_PORT: ${RABBITMQ_PORT}
        RABBITMQ_USER: ${RABBITMQ_USER}
        RABBITMQ_PASS: ${RABBITMQ_PASS}
        GENERATE_SWAGGER: ${GENERATE_SWAGGER}
        SWAGGER_OUT_DIR: ${SWAGGER_OUT_DIR}
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: sh -c "sleep 5 && npm run start:dev user-service"
    networks:
      - mlocks_bridge

  task-service:
    build: 
      context: .
      dockerfile: apps/task-service/Dockerfile
    container_name: mlocks_task_manager_task_service
    environment:
        DATABASE_HOST: ${DATABASE_HOST}
        DATABASE_PORT: ${DATABASE_PORT}
        DATABASE_USER: ${DATABASE_USER}
        DATABASE_PASSWORD: ${DATABASE_PASSWORD}
        DATABASE_NAME: ${DATABASE_NAME}
        RABBITMQ_HOST: ${RABBITMQ_HOST}
        RABBITMQ_PORT: ${RABBITMQ_PORT}
        RABBITMQ_USER: ${RABBITMQ_USER}
        RABBITMQ_PASS: ${RABBITMQ_PASS}
        GENERATE_SWAGGER: ${GENERATE_SWAGGER}
        SWAGGER_OUT_DIR: ${SWAGGER_OUT_DIR}
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "3001:3000"
    volumes:
      - .:/app
    command: sh -c "sleep 5 && npm run start:dev task-service"
    networks:
      - mlocks_bridge

  notification-service:
    build: 
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: mlocks_task_manager_notification_service
    environment:
        DATABASE_HOST: ${DATABASE_HOST}
        DATABASE_PORT: ${DATABASE_PORT}
        DATABASE_USER: ${DATABASE_USER}
        DATABASE_PASSWORD: ${DATABASE_PASSWORD}
        DATABASE_NAME: ${DATABASE_NAME}
        RABBITMQ_HOST: ${RABBITMQ_HOST}
        RABBITMQ_PORT: ${RABBITMQ_PORT}
        RABBITMQ_USER: ${RABBITMQ_USER}
        RABBITMQ_PASS: ${RABBITMQ_PASS}
        MAILHOG_HOST: ${MAILHOG_HOST}
        MAILHOG_PORT: ${MAILHOG_PORT}
        GENERATE_SWAGGER: ${GENERATE_SWAGGER}
        SWAGGER_OUT_DIR: ${SWAGGER_OUT_DIR}
    depends_on:
      - postgres
      - rabbitmq
      - mailhog
    ports:
      - "3002:3000"
    volumes:
      - .:/app
    command: sh -c "sleep 5 && npm run start:dev notification-service"
    networks:
      - mlocks_bridge
  docs:
    image: node:20
    container_name: mlocks_task_manager_docs
    working_dir: /app
    volumes:
      - ./node_modules:/app/node_modules
      - ./package.json:/app/package.json
      - ./scripts:/app/scripts
      - ./docs:/app/docs
    environment:
      PORT: 3004
      SWAGGER_OUT_DIR: ${SWAGGER_OUT_DIR}
    ports:
      - "3004:3004"
    command: sh -c "sleep 10 && npm run docs:generate && npm run docs:serve"
    networks:
      - mlocks_bridge
      
networks:
  mlocks_bridge:
    driver: bridge
    
volumes:
  pgdata:
  rabbitmqdata: